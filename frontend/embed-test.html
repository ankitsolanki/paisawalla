<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Embed Test</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f9fafb;
        padding: 40px;
      }
      .frame {
        max-width: 900px;
        margin: 0 auto;
        background: white;
        padding: 32px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(15, 23, 42, 0.1);
      }
      #pw-form {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <h1>PW Form Embed Test</h1>
      <p>This page simulates how the form is embedded in Webflow or any host page.</p>

      <div id="pw-form"></div>

      <script
        src="./dist/injectForm.js"
        data-form="form1"
        data-theme="light"
        data-container="pw-form"
        data-api-url="http://localhost:3000"
        data-recaptcha-site-key="test-site-key"
      ></script>
    </div>
  </body>
</html>
